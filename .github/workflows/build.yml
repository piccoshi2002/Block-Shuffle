name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn package

      - name: Upload plugin jar
        uses: actions/upload-artifact@v4
        with:
          name: BlockShuffle-jar
          path: target/BlockShuffle-*.jar
          retention-days: 30
